spring:
  application:
    name: weatherapp
  datasource:
    url: jdbc:mysql://localhost:3306/weather_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  cache:
    type: redis
    cache-names: weather
  data:
    redis:
      host: localhost
      port: 6379